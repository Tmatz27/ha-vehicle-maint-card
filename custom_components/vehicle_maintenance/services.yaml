log_maintenance:
  name: Log maintenance
  description: Complete a service at the effective odometer or an exact supplied mileage.
  fields:
    entry_id: &entry
      name: Vehicle entry ID
      required: true
      selector: {text: {}}
    service: &service
      name: Service key
      required: true
      selector: {text: {}}
    mileage:
      name: Mileage when completed
      required: false
      selector: {number: {min: 1, max: 1000000, mode: box}}

log_maintenance_batch:
  name: Log a service visit
  description: Complete several tracked maintenance items at one effective or exact odometer reading.
  fields:
    entry_id: *entry
    services:
      name: Maintenance completed
      required: true
      selector:
        select:
          multiple: true
          options:
            - {label: Oil Change, value: oil_change}
            - {label: Tire Rotation, value: tire_rotation}
            - {label: Engine Air Filter, value: engine_air_filter}
            - {label: Cabin Air Filter, value: cabin_air_filter}
            - {label: Brake Fluid, value: brake_fluid}
            - {label: Coolant, value: coolant}
            - {label: CVT Fluid Inspection, value: transmission_fluid}
            - {label: Differential Fluid Inspection, value: differential_service}
            - {label: Wiper Blades, value: wiper_blades}
            - {label: Battery Check, value: battery_check}
            - {label: Tire Replacement, value: tire_replacement}
            - {label: Spark Plugs, value: spark_plugs}
            - {label: Brake Pad Inspection, value: brake_pads}
            - {label: Wheel Alignment Check, value: wheel_alignment}
            - {label: PCV Valve Inspection, value: pcv_valve}
            - {label: Fuel Filter, value: fuel_filter}
            - {label: Timing Belt or Chain Inspection, value: timing_inspection}
            - {label: "30,000 mi Service", value: service_30k}
            - {label: "60,000 mi Service", value: service_60k}
            - {label: "90,000 mi Service", value: service_90k}
            - {label: "120,000 mi Service", value: service_120k}
            - {label: "125,000 mi Service", value: service_125k}
            - {label: "180,000 mi Service", value: service_180k}
            - {label: "200,000 mi Service", value: service_200k}
    mileage:
      name: Mileage when completed
      required: false
      selector: {number: {min: 1, max: 1000000, mode: box}}

snooze_maintenance:
  name: Extend maintenance
  description: Postpone dashboard attention and notifications from the effective odometer without logging the service as completed.
  fields:
    entry_id: *entry
    service: *service
    miles:
      name: Extension amount in miles
      required: false
      selector: {number: {min: 1, max: 100000, mode: box}}
    until_mileage:
      name: Explicit extension target mileage
      required: false
      selector: {number: {min: 1, max: 1000000, mode: box}}

clear_snooze:
  name: Clear extension
  fields:
    entry_id: *entry
    service: *service

set_maintenance:
  name: Set maintenance record
  description: Initialize or correct a service without fabricating completion history.
  fields:
    entry_id: *entry
    service: *service
    mode:
      name: Record state
      required: true
      selector:
        select:
          options:
            - {label: Never performed, value: never_performed}
            - {label: Last completed at mileage, value: last_completed}
            - {label: Due at known mileage, value: due_at}
    mileage:
      name: Mileage
      required: false
      selector: {number: {min: 0, max: 1000000, mode: box}}

reset_service:
  name: Reset service
  description: Return a service, including a milestone, to Never performed.
  fields:
    entry_id: *entry
    service: *service

set_effective_odometer:
  name: Set cached odometer
  description: Explicitly correct the persisted effective odometer when a source is stale or has decreased legitimately.
  fields:
    entry_id: *entry
    mileage:
      name: Mileage
      required: true
      selector: {number: {min: 0, max: 1000000, mode: box}}
    allow_decrease:
      name: Allow decrease
      default: false
      selector: {boolean: {}}
