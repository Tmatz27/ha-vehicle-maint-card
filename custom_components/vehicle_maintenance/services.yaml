log_maintenance:
  name: Log maintenance
  description: Mark a selected service complete at the current odometer mileage.
  fields:
    entry_id:
      name: Vehicle entry
      required: true
      selector:
        text:
    service:
      name: Service
      required: true
      selector:
        text:

extend_maintenance:
  name: Extend maintenance
  description: Move a selected service due mileage without changing its completion history.
  fields:
    entry_id:
      name: Vehicle entry
      required: true
      selector:
        text:
    service:
      name: Service
      required: true
      selector:
        text:
    miles:
      name: Miles
      required: true
      selector:
        number:
          min: 1
          max: 10000
          mode: box
