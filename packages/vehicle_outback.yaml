template:
  - sensor:
      - name: Outback Odometer Effective
        unique_id: outback_odometer_effective
        unit_of_measurement: mi
        device_class: distance
        state_class: total_increasing
        icon: mdi:road-variant
        availability: >-
          {{ is_number(states('sensor.outback_odometer')) or is_number(states('input_number.outback_current_mileage')) }}
        state: >-
          {% set live = states('sensor.outback_odometer') %}
          {{ live | int if is_number(live) else states('input_number.outback_current_mileage') | int(0) }}
        attributes:
          vehicle: 2024 Outback Wilderness
          source: >-
            {{ 'Subaru' if is_number(states('sensor.outback_odometer')) else 'Manual cache' }}

      - name: Outback Oil Change Miles Remaining
        unique_id: outback_oil_change_miles_remaining
        unit_of_measurement: mi
        device_class: distance
        icon: mdi:oil
        availability: >-
          {{ is_state('input_boolean.outback_track_oil_change', 'on') and is_number(states('sensor.outback_odometer_effective')) }}
        state: >-
          {{ states('input_number.outback_last_oil_change') | int(0) + 6000 + states('input_number.outback_oil_change_schedule_adjustment') | int(0) - states('sensor.outback_odometer_effective') | int(0) }}
        attributes:
          service_name: Oil Change
          interval_miles: 6000
          last_completed_mileage: "{{ states('input_number.outback_last_oil_change') | int(0) }}"
          schedule_adjustment: "{{ states('input_number.outback_oil_change_schedule_adjustment') | int(0) }}"
          next_due_mileage: >-
            {{ states('input_number.outback_last_oil_change') | int(0) + 6000 + states('input_number.outback_oil_change_schedule_adjustment') | int(0) }}
          status: >-
            {% set remaining = this.state | int(999999) %}
            {% if remaining < 0 %}overdue{% elif remaining <= 500 %}due{% elif remaining <= 1500 %}soon{% elif remaining <= 6000 %}upcoming{% else %}okay{% endif %}

      - name: Outback Tire Rotation Miles Remaining
