  - sensor:
      - name: Outback Maintenance Summary
        unique_id: outback_maintenance_summary
        icon: mdi:car-wrench
        state: >-
          {% set ns = namespace(overdue=0, due=0, soon=0, upcoming=0) %}
          {% for item in expand('group.outback_maintenance_entities') %}
            {% set miles = item.state | int(999999) %}
            {% if miles < 0 %}{% set ns.overdue = ns.overdue + 1 %}
            {% elif miles <= 500 %}{% set ns.due = ns.due + 1 %}
            {% elif miles <= 1500 %}{% set ns.soon = ns.soon + 1 %}
            {% elif miles <= 6000 %}{% set ns.upcoming = ns.upcoming + 1 %}{% endif %}
          {% endfor %}
          {{ 'overdue' if ns.overdue else 'due' if ns.due else 'soon' if ns.soon else 'upcoming' if ns.upcoming else 'okay' }}
        attributes:
          vehicle_name: 2024 Outback Wilderness
          odometer: "{{ states('sensor.outback_odometer_effective') | int(0) }}"
          odometer_source: "{{ state_attr('sensor.outback_odometer_effective', 'source') }}"
          maintenance_entities:
            - sensor.outback_oil_change_miles_remaining
            - sensor.outback_tire_rotation_miles_remaining
            - sensor.outback_engine_air_filter_miles_remaining
            - sensor.outback_cabin_air_filter_miles_remaining
            - sensor.outback_brake_fluid_miles_remaining
            - sensor.outback_coolant_miles_remaining
            - sensor.outback_transmission_fluid_miles_remaining
            - sensor.outback_differential_service_miles_remaining
            - sensor.outback_wiper_blades_miles_remaining
            - sensor.outback_battery_check_miles_remaining
            - sensor.outback_tire_replacement_miles_remaining
            - sensor.outback_spark_plug_replacement_miles_remaining
            - sensor.outback_30k_service
            - sensor.outback_60k_service
            - sensor.outback_90k_service
            - sensor.outback_120k_service
            - sensor.outback_125k_service
            - sensor.outback_180k_service
            - sensor.outback_200k_service
          overdue_count: >-
            {% set ns = namespace(count=0) %}
            {% for item in expand('group.outback_maintenance_entities') %}
              {% set miles = item.state | int(999999) %}
              {% if miles < 0 %}{% set ns.count = ns.count + 1 %}{% endif %}
            {% endfor %}
            {{ ns.count }}
          due_count: >-
            {% set ns = namespace(count=0) %}
            {% for item in expand('group.outback_maintenance_entities') %}
              {% set miles = item.state | int(999999) %}
              {% if 0 <= miles <= 500 %}{% set ns.count = ns.count + 1 %}{% endif %}
            {% endfor %}
            {{ ns.count }}
          soon_count: >-
            {% set ns = namespace(count=0) %}
            {% for item in expand('group.outback_maintenance_entities') %}
              {% set miles = item.state | int(999999) %}
              {% if 500 < miles <= 1500 %}{% set ns.count = ns.count + 1 %}{% endif %}
            {% endfor %}
            {{ ns.count }}
          upcoming_count: >-
            {% set ns = namespace(count=0) %}
            {% for item in expand('group.outback_maintenance_entities') %}
              {% set miles = item.state | int(999999) %}
              {% if 1500 < miles <= 6000 %}{% set ns.count = ns.count + 1 %}{% endif %}
            {% endfor %}
            {{ ns.count }}

automation:
  - id: outback_cache_odometer
    alias: Outback cache odometer
    triggers:
      - trigger: state
        entity_id: sensor.outback_odometer
    conditions:
      - condition: template
        value_template: "{{ is_number(states('sensor.outback_odometer')) }}"
    actions:
      - action: input_number.set_value
        target:
          entity_id: input_number.outback_current_mileage
        data:
          value: "{{ states('sensor.outback_odometer') | int }}"
    mode: queued
    max: 10

  - id: outback_weekly_maintenance_notification
    alias: Outback weekly maintenance notification
    triggers:
      - trigger: time
        at: "17:00:00"
    conditions:
      - condition: time
        weekday: [sun]
    actions:
      - variables:
          entities: "{{ state_attr('sensor.outback_maintenance_summary', 'maintenance_entities') | default([], true) }}"
          due_items: >-
            {% set ns = namespace(items=[]) %}
            {% for entity in entities %}
              {% set miles = states(entity) | int(999999) %}
              {% if miles <= 1500 %}
                {% set name = state_attr(entity, 'service_name') | default(state_attr(entity, 'friendly_name'), true) %}
                {% set ns.items = ns.items + [{'name': name, 'remaining': miles}] %}
              {% endif %}
            {% endfor %}
            {{ ns.items | sort(attribute='remaining') }}
      - condition: template
        value_template: "{{ due_items | length > 0 }}"
      - action: notify.vehicle_maintenance
        data:
          title: Outback maintenance
          message: >-
            2024 Outback Wilderness ({{ states('sensor.outback_odometer_effective') | int(0) }} mi):
            {% for item in due_items %}
            - {{ item.name }}: {% if item.remaining < 0 %}{{ item.remaining | abs }} mi overdue{% else %}{{ item.remaining }} mi remaining{% endif %}
            {% endfor %}
          data:
            tag: outback_maintenance
            group: vehicle_maintenance
            notification_icon: mdi:car-wrench
    mode: single

script:
  outback_sync_odometer:
    alias: Sync Outback odometer
    sequence:
      - condition: template
        value_template: "{{ is_number(states('sensor.outback_odometer')) }}"
      - action: input_number.set_value
        target:
          entity_id: input_number.outback_current_mileage
        data:
          value: "{{ states('sensor.outback_odometer') | int }}"

  outback_log_maintenance:
    alias: Log Outback maintenance
    mode: single
    sequence:
      - variables:
          selection: "{{ states('input_select.outback_maintenance_service') }}"
          odometer: "{{ states('sensor.outback_odometer_effective') | int(-1) }}"
          maintenance_items:
            - name: Oil Change
              last_entity: input_number.outback_last_oil_change
              adjustment_entity: input_number.outback_oil_change_schedule_adjustment
              tracking_entity: input_boolean.outback_track_oil_change
              interval: 6000
            - name: Tire Rotation
              last_entity: input_number.outback_last_tire_rotation
              adjustment_entity: input_number.outback_tire_rotation_schedule_adjustment
              tracking_entity: input_boolean.outback_track_tire_rotation
              interval: 6000
            - name: Engine Air Filter
              last_entity: input_number.outback_last_engine_air_filter
              adjustment_entity: input_number.outback_engine_air_filter_schedule_adjustment
              tracking_entity: input_boolean.outback_track_engine_air_filter
              interval: 30000
            - name: Cabin Air Filter
              last_entity: input_number.outback_last_cabin_air_filter
              adjustment_entity: input_number.outback_cabin_air_filter_schedule_adjustment
              tracking_entity: input_boolean.outback_track_cabin_air_filter
              interval: 12000
            - name: Brake Fluid
              last_entity: input_number.outback_last_brake_fluid
              adjustment_entity: input_number.outback_brake_fluid_schedule_adjustment
              tracking_entity: input_boolean.outback_track_brake_fluid
              interval: 30000
            - name: Coolant
              last_entity: input_number.outback_last_coolant
              adjustment_entity: input_number.outback_coolant_schedule_adjustment
              tracking_entity: input_boolean.outback_track_coolant
              interval: 120000
            - name: Transmission Fluid
              last_entity: input_number.outback_last_transmission_fluid
              adjustment_entity: input_number.outback_transmission_fluid_schedule_adjustment
              tracking_entity: input_boolean.outback_track_transmission_fluid
              interval: 60000
            - name: Differential Service
              last_entity: input_number.outback_last_differential_service
              adjustment_entity: input_number.outback_differential_service_schedule_adjustment
              tracking_entity: input_boolean.outback_track_differential_service
              interval: 30000
            - name: Wiper Blades
              last_entity: input_number.outback_last_wiper_blades
              adjustment_entity: input_number.outback_wiper_blades_schedule_adjustment
              tracking_entity: input_boolean.outback_track_wiper_blades
              interval: 12000
            - name: Battery Check
              last_entity: input_number.outback_last_battery_check
              adjustment_entity: input_number.outback_battery_check_schedule_adjustment
              tracking_entity: input_boolean.outback_track_battery_check
              interval: 60000
            - name: Tire Replacement
              last_entity: input_number.outback_last_tire_replacement
              adjustment_entity: input_number.outback_tire_replacement_schedule_adjustment
              tracking_entity: input_boolean.outback_track_tire_replacement
              interval: 50000
            - name: Spark Plug Replacement
              last_entity: input_number.outback_last_spark_plug_replacement
              adjustment_entity: input_number.outback_spark_plug_replacement_schedule_adjustment
              tracking_entity: input_boolean.outback_track_spark_plug_replacement
              interval: 60000
            - name: 30,000 mi Service
              milestone_entity: input_boolean.outback_service_30k_done
            - name: 60,000 mi Service
              milestone_entity: input_boolean.outback_service_60k_done
            - name: 90,000 mi Service
              milestone_entity: input_boolean.outback_service_90k_done
            - name: 120,000 mi Service
              milestone_entity: input_boolean.outback_service_120k_done
            - name: 125,000 mi Service
              milestone_entity: input_boolean.outback_service_125k_done
            - name: 180,000 mi Service
              milestone_entity: input_boolean.outback_service_180k_done
            - name: 200,000 mi Service
              milestone_entity: input_boolean.outback_service_200k_done
          selected: >-
            {{ maintenance_items | selectattr('name', 'eq', selection) | list | first | default(dict()) }}
      - choose:
          - conditions: "{{ selection != 'Select service' and odometer >= 0 and selected != dict() }}"
            sequence:
              - choose:
                  - conditions: "{{ 'last_entity' in selected }}"
                    sequence:
                      - action: input_number.set_value
                        data:
                          entity_id: "{{ selected.last_entity }}"
                          value: "{{ odometer }}"
                      - action: input_number.set_value
                        data:
                          entity_id: "{{ selected.adjustment_entity }}"
                          value: 0
                      - action: input_boolean.turn_on
                        data:
                          entity_id: "{{ selected.tracking_entity }}"
                  - conditions: "{{ 'milestone_entity' in selected }}"
                    sequence:
                      - action: input_boolean.turn_on
                        data:
                          entity_id: "{{ selected.milestone_entity }}"
              - action: persistent_notification.create
                data:
                  title: Maintenance logged
                  message: "{{ selection }} was logged at {{ odometer }} mi."
              - action: input_select.select_option
                target:
                  entity_id: input_select.outback_maintenance_service
                data:
                  option: Select service
        default:
          - action: persistent_notification.create
            data:
              title: Maintenance was not logged
              message: Select a service and make sure the odometer is available.

