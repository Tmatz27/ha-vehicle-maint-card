      - Oil Change
      - Tire Rotation
      - Engine Air Filter
      - Cabin Air Filter
      - Brake Fluid
      - Coolant
      - Transmission Fluid
      - Differential Service
      - Wiper Blades
      - Battery Check
      - Tire Replacement
      - Spark Plug Replacement
      - 30,000 mi Service
      - 60,000 mi Service
      - 90,000 mi Service
      - 120,000 mi Service
      - 125,000 mi Service
      - 180,000 mi Service
      - 200,000 mi Service
    initial: Select service
    icon: mdi:wrench-outline

  outback_defer_amount:
    name: Defer distance
    options: ["500", "1000", "2000"]
