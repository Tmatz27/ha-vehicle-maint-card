              tracking_entity: input_boolean.outback_track_spark_plug_replacement
              interval: 60000
            - name: 30,000 mi Service
              milestone_entity: input_boolean.outback_service_30k_done
            - name: 60,000 mi Service
              milestone_entity: input_boolean.outback_service_60k_done
            - name: 90,000 mi Service
              milestone_entity: input_boolean.outback_service_90k_done
            - name: 120,000 mi Service
              milestone_entity: input_boolean.outback_service_120k_done
            - name: 125,000 mi Service
              milestone_entity: input_boolean.outback_service_125k_done
            - name: 180,000 mi Service
              milestone_entity: input_boolean.outback_service_180k_done
            - name: 200,000 mi Service
              milestone_entity: input_boolean.outback_service_200k_done
          selected: >-
            {{ maintenance_items | selectattr('name', 'eq', selection) | list | first | default(dict()) }}
      - choose:
          - conditions: "{{ selected != dict() and 'last_entity' in selected }}"
            sequence:
              - choose:
                  - conditions: "{{ setup_mode == 'Not tracked' }}"
                    sequence:
                      - action: input_boolean.turn_off
                        data:
                          entity_id: "{{ selected.tracking_entity }}"
                  - conditions: "{{ setup_mode == 'Never performed' }}"
                    sequence:
                      - action: input_number.set_value
                        data:
                          entity_id: "{{ selected.last_entity }}"
                          value: 0
                      - action: input_number.set_value
                        data:
                          entity_id: "{{ selected.adjustment_entity }}"
                          value: 0
                      - action: input_boolean.turn_on
                        data:
                          entity_id: "{{ selected.tracking_entity }}"
                  - conditions: "{{ setup_mode == 'Last completed at mileage' }}"
                    sequence:
                      - action: input_number.set_value
                        data:
                          entity_id: "{{ selected.last_entity }}"
                          value: "{{ mileage }}"
                      - action: input_number.set_value
                        data:
                          entity_id: "{{ selected.adjustment_entity }}"
                          value: 0
                      - action: input_boolean.turn_on
                        data:
                          entity_id: "{{ selected.tracking_entity }}"
                  - conditions: "{{ setup_mode == 'Due at mileage' }}"
                    sequence:
                      - action: input_number.set_value
                        data:
                          entity_id: "{{ selected.last_entity }}"
                          value: "{{ [mileage - selected.interval, 0] | max }}"
                      - action: input_number.set_value
                        data:
                          entity_id: "{{ selected.adjustment_entity }}"
                          value: "{{ mileage - ([mileage - selected.interval, 0] | max) - selected.interval }}"
                      - action: input_boolean.turn_on
                        data:
                          entity_id: "{{ selected.tracking_entity }}"
              - action: persistent_notification.create
                data:
                  title: Maintenance setup updated
                  message: "{{ selection }}: {{ setup_mode }}{% if setup_mode not in ['Never performed', 'Not tracked'] %} ({{ mileage }} mi){% endif %}."
        default:
          - action: persistent_notification.create
            data:
              title: Setup was not changed
              message: Select a recurring service. Milestones are managed by their completion toggles.
