# Generic single-vehicle maintenance dashboard.
#
# SETUP
# 1. Replace every `replace_vehicle` token with this vehicle's entity prefix.
# 2. Replace `REPLACE_VEHICLE_NAME` with a non-sensitive display label.
# 3. Review the OPTIONAL blocks and remove any whose entities are not provided by
#    the existing maintenance package.
#
# REQUIRED SENSOR CONTRACT
# - sensor.replace_vehicle_*_miles_remaining
# - numeric state in miles; negative means overdue
# - optional attributes: service_name and next_due_mileage
#
# OPTIONAL ENTITY CONTRACT
# - sensor.replace_vehicle_maintenance_summary
# - sensor.replace_vehicle_odometer_effective
# - script.replace_vehicle_sync_odometer
# - input_select.replace_vehicle_maintenance_service
# - script.replace_vehicle_log_maintenance
# - input_select.replace_vehicle_defer_amount
# - script.replace_vehicle_defer_maintenance
# - input_select.replace_vehicle_setup_mode
# - input_number.replace_vehicle_setup_mileage
# - script.replace_vehicle_setup_maintenance

type: vertical-stack
cards:
  # OPTIONAL: remove this hero when no summary or odometer sensor is available.
  - type: custom:mushroom-template-card
    entity: sensor.replace_vehicle_maintenance_summary
    primary: REPLACE_VEHICLE_NAME
    secondary: >-
      {% set odometer = states('sensor.replace_vehicle_odometer_effective') %}
      {% if is_number(odometer) %}
        {{ odometer | int | format_number }} mi
      {% else %}
        Odometer unavailable
      {% endif %}
    icon: mdi:car
    icon_color: >-
      {% set status = states(entity) %}
      {{ 'red' if status == 'overdue' else
         'orange' if status == 'due' else
         'amber' if status == 'soon' else
         'blue' if status == 'upcoming' else
         'green' if status == 'okay' else 'grey' }}
    badge_icon: >-
      {{ 'mdi:alert-circle' if states(entity) in ['overdue', 'due'] else
         'mdi:check-circle' if states(entity) == 'okay' else 'mdi:clock-outline' }}
    badge_color: >-
      {{ 'red' if states(entity) == 'overdue' else
         'orange' if states(entity) == 'due' else
         'green' if states(entity) == 'okay' else 'grey' }}
    tap_action:
      action: more-info
    card_mod:
      style: |
        ha-card {
          padding: 8px;
          border-radius: 24px;
          background: linear-gradient(
            135deg,
            color-mix(in srgb, var(--primary-color) 16%, var(--ha-card-background)),
            var(--ha-card-background) 68%
          );
        }

  # OPTIONAL: summary attributes and sync action.
  - type: custom:mushroom-chips-card
    alignment: justify
    chips:
      - type: template
        entity: sensor.replace_vehicle_maintenance_summary
        icon: mdi:alert-octagon
        icon_color: red
        content: >-
          {{ state_attr(entity, 'overdue_count') | int(0) }} overdue
        tap_action:
          action: none
      - type: template
        entity: sensor.replace_vehicle_maintenance_summary
        icon: mdi:clock-alert-outline
        icon_color: orange
        content: >-
          {{ state_attr(entity, 'due_count') | int(0) }} due
        tap_action:
          action: none
      - type: template
        entity: sensor.replace_vehicle_maintenance_summary
        icon: mdi:calendar-clock
        icon_color: amber
        content: >-
          {{ (state_attr(entity, 'soon_count') | int(0)) +
             (state_attr(entity, 'upcoming_count') | int(0)) }} upcoming
        tap_action:
          action: none
      - type: action
        icon: mdi:refresh
        icon_color: blue
        tap_action:
          action: perform-action
          perform_action: script.replace_vehicle_sync_odometer
          confirmation:
            text: Sync the cached mileage with this vehicle's odometer?

  # REQUIRED: overdue and due-soon maintenance.
  - type: custom:auto-entities
    show_empty: false
    card:
      type: entities
      title: Needs attention
      icon: mdi:alert-circle-outline
      show_header_toggle: false
      state_color: true
      card_mod:
        style: |
          ha-card { border-radius: 24px; overflow: hidden; }
          .card-header { color: var(--error-color); }
          #states > * { min-height: 58px; }
    filter:
      include:
        - entity_id: sensor.replace_vehicle_*_miles_remaining
          state: < 501
          options: &maintenance_row
            type: custom:template-entity-row
            name: >-
              {{ state_attr(config.entity, 'service_name')
                 | default(state_attr(config.entity, 'friendly_name'), true) }}
            state: >-
              {% set miles = states(config.entity) | int(0) %}
              {% if miles < 0 %}
                {{ miles | abs | format_number }} mi overdue
              {% elif miles <= 500 %}
                Due in {{ miles | format_number }} mi
              {% else %}
                {{ miles | format_number }} mi remaining
              {% endif %}
            secondary: >-
              {% set due = state_attr(config.entity, 'next_due_mileage') %}
              {% if due is not none %}Due at {{ due | int | format_number }} mi{% endif %}
            tap_action:
              action: more-info
      exclude:
        - state: unavailable
        - state: unknown
    sort:
      method: state
      numeric: true
      direction: asc

  # REQUIRED: maintenance between 501 and 6,000 miles away.
  - type: custom:auto-entities
    show_empty: false
    card:
      type: entities
      title: Coming up
      icon: mdi:calendar-clock-outline
      show_header_toggle: false
      state_color: true
      card_mod:
        style: |
          ha-card { border-radius: 24px; overflow: hidden; }
          #states > * { min-height: 58px; }
    filter:
      include:
        - entity_id: sensor.replace_vehicle_*_miles_remaining
          state: "> 500"
          options: *maintenance_row
      exclude:
        - state: unavailable
        - state: unknown
        - state: "> 6000"
    sort:
      method: state
      numeric: true
      direction: asc

  # OPTIONAL: remove this entire card if the package has no matching actions.
  - type: entities
    title: Log or defer maintenance
    icon: mdi:wrench-clock
    show_header_toggle: false
    card_mod:
      style: |
        ha-card { border-radius: 24px; overflow: hidden; }
        #states > * { min-height: 56px; }
    entities:
      - entity: input_select.replace_vehicle_maintenance_service
        name: Service
      - type: section
        label: Mark completed
      - entity: sensor.replace_vehicle_odometer_effective
        name: Completion mileage
        icon: mdi:counter
      - type: button
        name: Log selected service
        icon: mdi:check-circle-outline
        action_name: LOG SERVICE
        tap_action:
          action: perform-action
          perform_action: script.replace_vehicle_log_maintenance
          confirmation:
            text: Log the selected service at the displayed odometer mileage?
      - type: section
        label: Defer a recurring service
      - entity: input_select.replace_vehicle_defer_amount
        name: Defer by
      - type: button
        name: Keep history and move the due mileage
        icon: mdi:calendar-arrow-right
        action_name: DEFER
        tap_action:
          action: perform-action
          perform_action: script.replace_vehicle_defer_maintenance
          confirmation:
            text: Defer the selected service without changing its completion history?

  # OPTIONAL: remove this entire card if the package has no setup workflow.
  - type: entities
    title: Maintenance setup
    icon: mdi:tune-variant
    show_header_toggle: false
    card_mod:
      style: |
        ha-card { border-radius: 24px; overflow: hidden; }
        #states > * { min-height: 56px; }
    entities:
      - type: custom:mushroom-title-card
        subtitle: >-
          Initialize history, set a known due mileage, or stop tracking an item.
      - entity: input_select.replace_vehicle_maintenance_service
        name: Service
      - entity: input_select.replace_vehicle_setup_mode
        name: Setup method
      - entity: input_number.replace_vehicle_setup_mileage
        name: Mileage
      - type: button
        name: Apply selected setup method
        icon: mdi:content-save-check-outline
        action_name: APPLY
        tap_action:
          action: perform-action
          perform_action: script.replace_vehicle_setup_maintenance
          confirmation:
            text: Apply this setup choice to the selected service?
