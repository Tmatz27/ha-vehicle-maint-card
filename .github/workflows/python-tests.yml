name: Python tests
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install pytest ruff pyyaml
      - run: pytest -q
      - run: ruff check custom_components tests scripts
      - run: python -m compileall -q custom_components
      - run: python scripts/validate_files.py
  home-assistant-store-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install pytest homeassistant
      - run: pytest -q tests/test_homeassistant_store_contract.py
