name: Frontend checks
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node --check custom_components/vehicle_maintenance/www/vehicle-maint-card.js
      - run: node --test tests/js/card.test.cjs
